services:
  n8n:
    image: n8nio/n8n:2.18.4
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
      - "5679:5679"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_API_DISABLED=false
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_AUTH_EXCLUDE_ENDPOINTS=rest/.*
      - WEBHOOK_URL=${WEBHOOK_URL:-https://n8n.anshul-garg.com}
      - N8N_HOST=${N8N_HOST:-n8n.anshul-garg.com}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-https://n8n.anshul-garg.com}
      - GENERIC_TIMEZONE=Asia/Kolkata
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - SARVAM_BASE_URL=${SARVAM_BASE_URL}
      - SARVAM_MODEL=${SARVAM_MODEL}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID:-}
      - GOOGLE_SHEET_NAME=${GOOGLE_SHEET_NAME:-Sheet1}
      - GOOGLE_DRIVE_KB_DEFAULT_FILE_ID=${GOOGLE_DRIVE_KB_DEFAULT_FILE_ID:-}
      - GOOGLE_DRIVE_KB_SALES_FILE_ID=${GOOGLE_DRIVE_KB_SALES_FILE_ID:-}
      - GOOGLE_DRIVE_KB_SUPPORT_FILE_ID=${GOOGLE_DRIVE_KB_SUPPORT_FILE_ID:-}
      - GOOGLE_DRIVE_KB_COMPLAINT_FILE_ID=${GOOGLE_DRIVE_KB_COMPLAINT_FILE_ID:-}
      - GOOGLE_DRIVE_KB_GENERAL_FILE_ID=${GOOGLE_DRIVE_KB_GENERAL_FILE_ID:-}
      - GOOGLE_DRIVE_KB_ORDER_FILE_ID=${GOOGLE_DRIVE_KB_ORDER_FILE_ID:-}
      - GOOGLE_DRIVE_KB_FILE_ID=${GOOGLE_DRIVE_KB_FILE_ID:-}
      - GMAIL_SEND_MODE=${GMAIL_SEND_MODE:-auto}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
    volumes:
      - ./n8n/.n8n:/home/node/.n8n
    networks:
      - app-network

  task-runners:
    image: n8nio/runners:2.18.4
    container_name: n8n-runners
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_MODE=external
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    depends_on:
      - n8n
    volumes:
      - ./n8n/.n8n:/home/node/.n8n
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN:?Set CLOUDFLARED_TUNNEL_TOKEN in .env}
    depends_on:
      - n8n
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - SARVAM_BASE_URL=${SARVAM_BASE_URL}
      - SARVAM_MODEL=${SARVAM_MODEL}
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL}
      - N8N_URL=${N8N_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - FRONTEND_URL=${FRONTEND_URL}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
    volumes:
      - ./backend:/app
    depends_on:
      - n8n
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://backend:8000}
      - NEXT_PUBLIC_N8N_EDITOR_URL=${NEXT_PUBLIC_N8N_EDITOR_URL:-https://n8n.anshul-garg.com}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
